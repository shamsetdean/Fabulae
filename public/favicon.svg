<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1A17"/>
      <stop offset="100%" style="stop-color:#0A0908"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E63946"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Masque comédie -->
  <g transform="translate(4, 5)">
    <!-- Visage du masque -->
    <ellipse cx="12" cy="11" rx="10" ry="9" fill="none" stroke="url(#flame)" stroke-width="1.6"/>
    <!-- Yeux heureux (arcs courbés vers le haut) -->
    <path d="M7 9.5 Q8.5 8 10 9.5" fill="none" stroke="url(#flame)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M14 9.5 Q15.5 8 17 9.5" fill="none" stroke="url(#flame)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Sourire -->
    <path d="M7.5 13.5 Q12 17.5 16.5 13.5" fill="none" stroke="url(#flame)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Ruban en bas du masque -->
    <path d="M12 20 Q10 22 8 21 M12 20 Q14 22 16 21" fill="none" stroke="url(#flame)" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
